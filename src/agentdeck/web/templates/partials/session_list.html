{# one merged, ungrouped list across all accounts.
   `sessions` = [Session] (pre-sorted), `labels` = {account_key: label}. #}
<div class="session-list">
  {% for s in sessions %}
    {% set label = labels.get(s.account_key) %}
    {% include "partials/session_card.html" %}
  {% else %}
    <div class="empty">no active sessions</div>
  {% endfor %}
</div>
