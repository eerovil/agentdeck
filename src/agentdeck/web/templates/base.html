<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="dark light">
  <title>{% block title %}agentdeck{% endblock %}</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#14161a">
  <meta name="apple-mobile-web-app-title" content="agentdeck">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="/static/app.css?v={{ asset_ver }}">
  <script>
  // Register the service worker (installable PWA / standalone display). Served
  // from the site root so its scope covers the whole app; failures are non-fatal
  // (e.g. plain-HTTP remote origin, which is not a secure context).
  if ('serviceWorker' in navigator) {
    // Auto-update: force an update check on each load, and when a freshly
    // activated worker takes control (the new SW calls skipWaiting +
    // clients.claim), reload once so stale cached CSS/JS is replaced without
    // the user having to clear site data. The page HTML is never SW-cached, so
    // this script always runs fresh even behind an out-of-date worker.
    var reloading = false;
    navigator.serviceWorker.addEventListener('controllerchange', function () {
      if (reloading) return;
      reloading = true;
      window.location.reload();
    });
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('/sw.js').then(function (reg) {
        reg.update();
      }).catch(function () {});
    });
  }
  </script>
  <script src="/static/htmx.min.js?v={{ asset_ver }}" defer></script>
  <script src="/static/sse.js?v={{ asset_ver }}" defer></script>
</head>
<body class="{% block body_class %}{% endblock %}" hx-ext="sse" {% block body_sse %}sse-connect="/events"{% endblock %}>
  <header class="topbar">
    <div class="topbar-row">
      {% block topbar_nav %}{% endblock %}
      <div class="brand">agentdeck</div>
    </div>
    <div id="limit-bars" sse-swap="usage">
      {% block limit_bars %}{% endblock %}
    </div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script>
  // Minimal, injection-safe markdown → HTML (escape first, then format). Used to
  // prettify transcript messages in the detail view and expanded list cards.
  function mdEscape(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  function mdSafeHref(url) {
    var scheme = url.match(/^([a-z][a-z0-9+.-]*):/i);
    return !scheme || /^(?:https?|mailto)$/i.test(scheme[1]);
  }
  function mdInline(s) {
    s = s.replace(/`([^`]+)`/g, function (_, c) { return '<code>' + c + '</code>'; });
    s = s.replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/(^|[^\w*])\*([^*\n]+?)\*(?!\w)/g, '$1<em>$2</em>');
    s = s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, function (match, label, url) {
      if (!mdSafeHref(url)) return match;
      return '<a href="' + url + '" target="_blank" rel="noopener">' + label + '</a>';
    });
    return s;
  }
  function mdToHtml(text) {
    var segs = mdEscape(text).split(/```/), out = '';
    for (var i = 0; i < segs.length; i++) {
      if (i % 2 === 1) {                       // inside a fenced code block
        out += '<pre><code>' + segs[i].replace(/^[^\n]*\n/, '').replace(/\n$/, '') + '</code></pre>';
        continue;
      }
      var lines = segs[i].split('\n'), buf = '', inList = false;
      for (var j = 0; j < lines.length; j++) {
        var ln = lines[j], li = ln.match(/^\s*[-*+]\s+(.*)$/), hd = ln.match(/^\s*(#{1,6})\s+(.*)$/);
        if (li) { if (!inList) { buf += '<ul>'; inList = true; } buf += '<li>' + mdInline(li[1]) + '</li>'; continue; }
        if (inList) { buf += '</ul>'; inList = false; }
        if (hd) buf += '<div class="md-h">' + mdInline(hd[2]) + '</div>';
        else if (ln.trim() === '') buf += '<br>';
        else buf += mdInline(ln) + '<br>';
      }
      if (inList) buf += '</ul>';
      out += buf;
    }
    return out.replace(/<br>(\s*<(?:ul|pre))/g, '$1').replace(/(<\/(?:ul|pre)>)<br>/g, '$1').replace(/<br>\s*$/, '');
  }

  // Connection hygiene + live-stream recovery across the (mobile PWA) lifecycle.
  // Over HTTP/1.1 a browser allows ~6 sockets per host and each open page holds
  // a long-lived SSE stream, so a few navigations exhaust the cap. We close
  // streams on leave; a bfcached page keeps its EventSource but won't reconnect,
  // so reload on restore. The harder case is an installed PWA: mobile freezes
  // the app in the background and tears the SSE socket down, and a source we've
  // .close()d never fires htmx's auto-reconnect — so on return the cards sit
  // stale until a manual refresh. Fix: when the page becomes visible again,
  // check the stream and reload if it's dead (what pull-to-refresh did by hand).
  (function () {
    var sources = new Set();
    // The server pushes a `usage` event at least every 30s (plus a ping comment
    // every 15s), so under health we hear from it constantly. Track the last
    // time we did: this is the reliable liveness signal. EventSource.readyState
    // is NOT — a socket the OS froze in the background commonly still reports
    // OPEN, so a readyState check would think a dead stream is fine.
    var lastMsgAt = Date.now();
    document.body.addEventListener('htmx:sseOpen', function (e) {
      if (e.detail && e.detail.source) sources.add(e.detail.source);
      lastMsgAt = Date.now();
    });
    document.body.addEventListener('htmx:sseMessage', function () { lastMsgAt = Date.now(); });
    document.body.addEventListener('htmx:sseClose', function (e) {
      if (e.detail && e.detail.source) sources.delete(e.detail.source);
    });
    // Dead if we've heard nothing for well past the 30s usage cadence.
    function streamStale() { return Date.now() - lastMsgAt > 75000; }
    function recover() {
      if (document.visibilityState === 'visible' && streamStale()) location.reload();
    }

    window.addEventListener('pagehide', function () {
      sources.forEach(function (s) { try { s.close(); } catch (_) {} });
      sources.clear();
    });
    window.addEventListener('pageshow', function (e) { if (e.persisted) location.reload(); });
    // Installed as a PWA, mobile freezes the app in the background and tears the
    // SSE socket down without reliably firing pagehide/onerror. On return, give
    // any in-flight reconnect a moment, then reload if the stream is stale.
    document.addEventListener('visibilitychange', function () {
      if (document.visibilityState === 'visible') setTimeout(recover, 2000);
    });
    // And a watchdog while visible, to catch a socket that silently died mid-use
    // (a zombie OPEN EventSource never fires onerror, so htmx won't reconnect).
    setInterval(recover, 20000);
  })();

  // Per-card live feed with a typewriter reveal for new replies. Re-run after
  // every SSE list swap, since the cards are replaced wholesale.
  (function () {
    // Each card is a small live feed. The whole list is swapped wholesale on any
    // update, so we keep the accumulated feed per session (keyed by its URL) in
    // JS across swaps. When a card's reply changes, the newest text is revealed
    // with a typewriter effect; otherwise the card just rests at the bottom.
    var MAXLEN = 16;             // keep the most recent N messages per card
    var feed = new Map();        // href -> [{role, text}]
    var lastSeen = new Map();    // href -> {prompt, text}
    var expanded = new Set();    // hrefs whose card is expanded inline (persists across swaps)
    var typing = new Map();      // href -> {full, shown, el, box, inner, md} — active typewriter

    // Read the current latest from stable data-attributes on the box — NOT from
    // the inner DOM, which renderFeed() rebuilds (so re-reading it would return
    // wrong values and falsely flag every card as changed).
    function latestOf(box) {
      return { prompt: (box.dataset.prompt || '').trim(), text: (box.dataset.text || '').trim() };
    }
    function renderInto(el, text, md, cursor) {
      if (md) { el.innerHTML = mdToHtml(text); el.setAttribute('data-md', ''); }
      else { el.textContent = text; }
      if (cursor) { var c = document.createElement('span'); c.className = 'type-caret'; el.appendChild(c); }
    }
    function toBottom(box, inner) {
      var ov = inner.scrollHeight - box.clientHeight;
      inner.style.transform = ov > 6 ? 'translateY(' + (-ov) + 'px)' : '';
    }
    function renderFeed(inner, arr, md, key) {
      inner.textContent = '';
      var t = typing.get(key), found = false;
      if (t) t.el = null;
      arr.forEach(function (m) {
        var line = document.createElement('span');
        line.className = 'latest-line' + (m.role === 'agent' ? ' agent' : '');
        var arrow = document.createElement('span');
        arrow.className = 'latest-arrow';
        arrow.textContent = m.role === 'agent' ? '⟳' : '↳';
        var txt = document.createElement('span');
        txt.className = 'lt-text';
        if (t && m === t.entry) {                   // the line being typed out
          found = true;
          t.el = txt; t.box = inner.parentElement; t.inner = inner; t.md = md; t.full = m.text;
          var n = Math.floor(t.shown);
          renderInto(txt, m.text.slice(0, n), md, n < m.text.length);
        } else {
          renderInto(txt, m.text, md, false);
        }
        line.appendChild(arrow); line.appendChild(txt);
        inner.appendChild(line);
      });
      if (t && !found) typing.delete(key);          // its message scrolled out of the window
    }
    function setup(scope) {
      (scope || document).querySelectorAll('[data-marquee]').forEach(function (box) {
        var inner = box.querySelector('.latest-scroll');
        if (!inner) return;
        var card = box.closest('a.session');
        var key = card ? card.getAttribute('href') : null;
        if (!key) return;
        var known = lastSeen.has(key);            // seen this session before this render?
        var cur = latestOf(box);
        var role = box.dataset.latestRole || 'agent';  // who spoke most recently
        var prev = lastSeen.get(key) || {};
        var arr = feed.get(key) || [];
        var typeEntry = null, typeFrom = null;    // the agent entry to type out, and from where

        function addUser() { arr.push({ role: 'user', text: cur.prompt }); }
        function addAgent(doType) {
          var l = arr.length ? arr[arr.length - 1] : null;
          if (l && l.role === 'agent') {          // same reply still streaming — grow in place
            var oldLen = l.text.length; l.text = cur.text;
            if (doType) { typeEntry = l; typeFrom = typing.has(key) ? Math.min(typing.get(key).shown, cur.text.length) : oldLen; }
          } else {
            var e = { role: 'agent', text: cur.text }; arr.push(e);
            if (doType) { typeEntry = e; typeFrom = 0; }   // brand-new reply types from the start
          }
        }
        var pc = cur.prompt && cur.prompt !== prev.prompt;
        var tc = cur.text && cur.text !== prev.text;
        // Order the two lines chronologically via last_role, and type the reply
        // only when the agent is the current speaker (not when the user's
        // message is the newest — then it's the user's turn, no typing).
        if (pc && tc) {
          if (role === 'user') { addAgent(false); addUser(); }   // agent older, user newest
          else { addUser(); addAgent(true); }                    // user older, agent newest
        } else if (pc) {
          addUser();
        } else if (tc) {
          addAgent(role === 'agent');
        }
        if (arr.length > MAXLEN) arr = arr.slice(arr.length - MAXLEN);
        lastSeen.set(key, cur);
        feed.set(key, arr);

        // Start/continue the typewriter — but never on first load or when the
        // card is expanded (reading mode shows the full text at once).
        if (typeEntry && known && !expanded.has(key)) {
          typing.set(key, { entry: typeEntry, full: typeEntry.text, shown: typeFrom });
        }
        // Re-apply the (client-only) expanded state, which survives list swaps.
        if (card.classList.contains('expanded') !== expanded.has(key)) {
          card.classList.toggle('expanded', expanded.has(key));
        }
        if (expanded.has(key)) typing.delete(key);

        renderFeed(inner, arr, expanded.has(key), key);
        inner.style.transform = '';
        if (expanded.has(key)) { box.scrollTop = box.scrollHeight; return; }
        box.scrollTop = 0;   // clear scroll left over from expanded mode, else the
                             // leftover offset + transform hides the text (blank card)
        toBottom(box, inner);                     // keep the newest text in view
      });
    }
    // Advance every active typewriter at a fixed 300 WPM (standard 5 chars/word
    // = 25 chars/sec), timed off requestAnimationFrame elapsed-ms so it's smooth
    // and reliable on mobile (setInterval gets throttled). t.shown is fractional.
    var CHARS_PER_MS = 300 * 5 / 60 / 1000;  // 300 wpm
    var lastTs = null;
    function tick(ts) {
      var dt = lastTs == null ? 16 : Math.min(200, ts - lastTs);
      lastTs = ts;
      typing.forEach(function (t, key) {
        if (!t.el || t.full == null) return;
        t.shown = Math.min(t.full.length, t.shown + CHARS_PER_MS * dt);
        var n = Math.floor(t.shown);
        renderInto(t.el, t.full.slice(0, n), t.md, n < t.full.length);
        if (t.box && t.inner) toBottom(t.box, t.inner);
        if (n >= t.full.length) typing.delete(key);
      });
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);

    // Run synchronously on swap (before paint) so a reorder never flashes.
    window.addEventListener('load', function () { requestAnimationFrame(function () { setup(); }); });
    document.body.addEventListener('htmx:afterSwap', function (e) { setup(e.target); });

    // Inline expand/collapse toggle. The button lives inside the card <a>, so
    // stop it from navigating; toggle the persisted set and re-run setup.
    document.addEventListener('click', function (e) {
      var btn = e.target.closest('.expand-btn');
      if (!btn) return;
      e.preventDefault(); e.stopPropagation();
      var card = btn.closest('a.session');
      var key = card && card.getAttribute('href');
      if (!key) return;
      if (expanded.has(key)) expanded.delete(key); else expanded.add(key);
      setup(card);
    });

    // External jump buttons (claude.ai deep link, GitHub issue). They sit inside
    // the card <a>, so stop the card from navigating and open the target in a
    // new tab instead.
    document.addEventListener('click', function (e) {
      var btn = e.target.closest('.cc-btn, .gh-btn');
      if (!btn) return;
      e.preventDefault(); e.stopPropagation();
      var url = btn.getAttribute('data-href');
      if (url) window.open(url, '_blank', 'noopener');
    });
  })();

  // Usage header expand/collapse — delegated (the fragment is swapped every
  // ~30s over SSE, so state lives on <body> + localStorage, not the fragment).
  (function () {
    var KEY = 'agentdeck.usageOpen';
    try { if (localStorage.getItem(KEY) === '1') document.body.classList.add('usage-open'); } catch (_) {}
    document.addEventListener('click', function (e) {
      if (!e.target.closest('.usage-mini')) return;
      var open = document.body.classList.toggle('usage-open');
      try { localStorage.setItem(KEY, open ? '1' : '0'); } catch (_) {}
    });
  })();

  // Tick the usage "updated Ns ago" every second, off each tag's data-since
  // epoch — so it stays live between server pushes (must mirror _fmt_age()).
  (function () {
    function fmtAge(sec) {
      if (sec < 5) return 'just now';
      if (sec < 60) return Math.floor(sec) + 's ago';
      var m = Math.floor(sec / 60);
      if (m < 60) return m + 'm ago';
      var h = Math.floor(m / 60); m = m % 60;
      if (h < 24) return h + 'h ' + m + 'm ago';
      var d = Math.floor(h / 24); h = h % 24;
      return d + 'd ' + h + 'h ago';
    }
    setInterval(function () {
      var now = Date.now() / 1000;
      document.querySelectorAll('.upd-tag[data-since]').forEach(function (el) {
        var since = parseFloat(el.getAttribute('data-since'));
        var rel = el.querySelector('.upd-rel');
        if (since && rel) rel.textContent = fmtAge(now - since);
      });
    }, 1000);
  })();

  // Render markdown in detail-view transcript messages (once each; new events
  // arrive over SSE and get enhanced on afterSwap).
  (function () {
    function enhance(scope) {
      (scope || document).querySelectorAll('.ev-text:not([data-md])').forEach(function (el) {
        el.innerHTML = mdToHtml(el.textContent);
        el.setAttribute('data-md', '');
      });
    }
    window.addEventListener('load', function () { enhance(); });
    document.body.addEventListener('htmx:afterSwap', function (e) { enhance(e.target); });
  })();

  // Chat composers: paste clipboard screenshots directly into the existing
  // hardened image-upload field. The delegated handlers cover both the new-chat
  // composer and session composer, including controls swapped later by HTMX.
  (function () {
    var imageTypes = /^(?:image\/png|image\/jpeg|image\/webp|image\/gif)$/;
    var previewUrls = new WeakMap();

    function imageInput(form) {
      return form && form.querySelector('input[type="file"][name="images"]');
    }
    function setFiles(input, files) {
      var transfer = new DataTransfer();
      files.forEach(function (file) { transfer.items.add(file); });
      input.files = transfer.files;
      input.dispatchEvent(new Event('change', { bubbles: true }));
    }
    function renderImages(input) {
      var old = previewUrls.get(input) || [];
      old.forEach(function (url) { URL.revokeObjectURL(url); });
      var urls = [];
      var box = input.nextElementSibling;
      if (!box || !box.classList.contains('paste-previews')) {
        box = document.createElement('div');
        box.className = 'paste-previews';
        box.setAttribute('aria-live', 'polite');
        input.insertAdjacentElement('afterend', box);
      }
      box.textContent = '';
      Array.from(input.files || []).forEach(function (file, index) {
        var item = document.createElement('span');
        item.className = 'paste-preview';
        var img = document.createElement('img');
        var url = URL.createObjectURL(file); urls.push(url);
        img.src = url; img.alt = '';
        var remove = document.createElement('button');
        remove.type = 'button'; remove.className = 'paste-remove';
        remove.textContent = '×'; remove.title = 'Remove ' + (file.name || 'pasted image');
        remove.setAttribute('aria-label', remove.title);
        remove.addEventListener('click', function () {
          setFiles(input, Array.from(input.files).filter(function (_, i) { return i !== index; }));
        });
        item.appendChild(img); item.appendChild(remove); box.appendChild(item);
      });
      if (input.files && input.files.length) {
        var count = document.createElement('span');
        count.className = 'paste-count';
        count.textContent = input.files.length + (input.files.length === 1 ? ' image attached' : ' images attached');
        box.appendChild(count);
      }
      previewUrls.set(input, urls);
    }

    document.addEventListener('paste', function (event) {
      var textarea = event.target.closest('textarea[name="message"]');
      var input = textarea && imageInput(textarea.form);
      if (!input || !event.clipboardData) return;
      var pasted = Array.from(event.clipboardData.items || []).filter(function (item) {
        return item.kind === 'file' && imageTypes.test(item.type);
      }).map(function (item) { return item.getAsFile(); }).filter(Boolean);
      if (!pasted.length) return; // ordinary text paste keeps its native behavior
      event.preventDefault();
      setFiles(input, Array.from(input.files || []).concat(pasted));
      textarea.focus();
    });
    document.addEventListener('change', function (event) {
      if (event.target.matches('input[type="file"][name="images"]')) renderImages(event.target);
    });
  })();

  // Enter submits, Shift+Enter keeps the expected multiline behavior.
  // Successful HTMX submissions clear and re-focus only the prompt.
  document.addEventListener('keydown', function (e) {
    if (e.key !== 'Enter' || e.shiftKey || e.isComposing) return;
    var input = e.target.closest('textarea.send-on-enter');
    if (!input || !input.form) return;
    e.preventDefault();
    input.form.requestSubmit();
  });
  document.body.addEventListener('htmx:afterRequest', function (e) {
    var form = e.detail && e.detail.elt;
    if (!e.detail || !e.detail.successful || !form || !form.matches('form[data-clear-on-send]')) return;
    var input = form.querySelector('textarea[name="message"]');
    if (input) { input.value = ''; input.focus(); }
    var images = form.querySelector('input[type="file"][name="images"]');
    if (images) { images.value = ''; images.dispatchEvent(new Event('change', { bubbles: true })); }
  });
  </script>
</body>
</html>
