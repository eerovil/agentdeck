<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="dark light">
  <title>{% block title %}agentdeck{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/htmx.min.js" defer></script>
  <script src="/static/sse.js" defer></script>
</head>
<body hx-ext="sse" {% block body_sse %}sse-connect="/events"{% endblock %}>
  <header class="topbar">
    <div class="topbar-row">
      {% block topbar_nav %}{% endblock %}
      <div class="brand">agentdeck</div>
    </div>
    <div id="limit-bars" sse-swap="usage">
      {% block limit_bars %}{% endblock %}
    </div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script>
  // Connection hygiene: over HTTP/1.1 a browser allows ~6 sockets per host, and
  // each open page holds a long-lived SSE stream. A bfcached page keeps its
  // EventSource, so a few navigations exhaust the cap and the next page stalls.
  // Close streams on leave; if the page is later restored from bfcache (where
  // they won't reconnect), reload fresh.
  (function () {
    var sources = new Set();
    document.body.addEventListener('htmx:sseOpen', function (e) {
      if (e.detail && e.detail.source) sources.add(e.detail.source);
    });
    window.addEventListener('pagehide', function () {
      sources.forEach(function (s) { try { s.close(); } catch (_) {} });
    });
    window.addEventListener('pageshow', function (e) { if (e.persisted) location.reload(); });
  })();

  // Auto-scroll ("marquee") for session cards whose latest text overflows the
  // fixed ~4-line window. Pure CSS can't measure overflow, so we measure here
  // and hand the distance/duration to the CSS animation. Re-run after every SSE
  // list swap, since the cards are replaced wholesale.
  (function () {
    // Each card is a small live feed. The whole list is swapped wholesale on any
    // update, so we keep the accumulated feed per session (keyed by its URL) in
    // JS across swaps: when a card's latest prompt/reply changes, we APPEND it to
    // that card's feed and re-run the marquee; otherwise the card just rests at
    // the bottom. Full messages, never truncated — the marquee scrolls them.
    var MAXLEN = 16;             // keep the most recent N messages per card
    var feed = new Map();        // href -> [{role, text}]
    var lastSeen = new Map();    // href -> {prompt, text}

    // Read the current latest from stable data-attributes on the box — NOT from
    // the inner DOM, which renderFeed() rebuilds (so re-reading it would return
    // wrong values and falsely flag every card as changed).
    function latestOf(box) {
      return { prompt: (box.dataset.prompt || '').trim(), text: (box.dataset.text || '').trim() };
    }
    function renderFeed(inner, arr) {
      inner.textContent = '';
      arr.forEach(function (m) {
        var line = document.createElement('span');
        line.className = 'latest-line' + (m.role === 'agent' ? ' agent' : '');
        var arrow = document.createElement('span');
        arrow.className = 'latest-arrow';
        arrow.textContent = m.role === 'agent' ? '⟳' : '↳';
        var txt = document.createElement('span');
        txt.className = 'lt-text';
        txt.textContent = m.text;                 // textContent = injection-safe
        line.appendChild(arrow); line.appendChild(txt);
        inner.appendChild(line);
      });
    }
    function setup(scope) {
      (scope || document).querySelectorAll('[data-marquee]').forEach(function (box) {
        var inner = box.querySelector('.latest-scroll');
        if (!inner) return;
        var card = box.closest('a.session');
        var key = card ? card.getAttribute('href') : null;
        if (!key) return;
        var known = lastSeen.has(key);            // seen this session before this render?
        var cur = latestOf(box);
        var prev = lastSeen.get(key) || {};
        var arr = feed.get(key) || [];
        var last = arr.length ? arr[arr.length - 1] : null;
        var newMessage = false;                   // a genuinely new turn (not streaming growth)
        if (cur.prompt && cur.prompt !== prev.prompt) {
          arr.push({ role: 'user', text: cur.prompt }); newMessage = true;
          last = arr[arr.length - 1];
        }
        if (cur.text && cur.text !== prev.text) {
          if (last && last.role === 'agent') {
            last.text = cur.text;                 // same reply still streaming — update in place
          } else {
            arr.push({ role: 'agent', text: cur.text }); newMessage = true;  // new reply
          }
        }
        if (arr.length > MAXLEN) arr = arr.slice(arr.length - MAXLEN);
        lastSeen.set(key, cur);
        feed.set(key, arr);
        renderFeed(inner, arr);

        // Marquee is reserved for a NEW message arriving while the page is open.
        // On first load and on reorder (no new message) just snap to the bottom
        // instantly — no scrolling animation.
        box.classList.remove('marquee');
        inner.style.transform = '';
        box.style.removeProperty('--marquee-dist');
        box.style.removeProperty('--marquee-dur');
        var overflow = inner.scrollHeight - box.clientHeight;
        if (overflow <= 6) return;                // fits — nothing to scroll
        if (known && newMessage) {
          box.style.setProperty('--marquee-dist', (-overflow) + 'px');
          box.style.setProperty('--marquee-dur', Math.min(30, Math.max(4, overflow / 35)).toFixed(1) + 's');
          box.classList.add('marquee');           // scroll once to the new bottom
        } else {
          inner.style.transform = 'translateY(' + (-overflow) + 'px)';  // instant to bottom
        }
      });
    }
    // Run synchronously on swap (before paint) so a reorder never flashes the
    // content from the top before snapping to the bottom.
    window.addEventListener('load', function () { requestAnimationFrame(function () { setup(); }); });
    document.body.addEventListener('htmx:afterSwap', function (e) { setup(e.target); });
  })();

  // Usage header expand/collapse — delegated (the fragment is swapped every
  // ~30s over SSE, so state lives on <body> + localStorage, not the fragment).
  (function () {
    var KEY = 'agentdeck.usageOpen';
    try { if (localStorage.getItem(KEY) === '1') document.body.classList.add('usage-open'); } catch (_) {}
    document.addEventListener('click', function (e) {
      if (!e.target.closest('.usage-mini')) return;
      var open = document.body.classList.toggle('usage-open');
      try { localStorage.setItem(KEY, open ? '1' : '0'); } catch (_) {}
    });
  })();

  // Tick the usage "updated Ns ago" every second, off each tag's data-since
  // epoch — so it stays live between server pushes (must mirror _fmt_age()).
  (function () {
    function fmtAge(sec) {
      if (sec < 5) return 'just now';
      if (sec < 60) return Math.floor(sec) + 's ago';
      var m = Math.floor(sec / 60);
      if (m < 60) return m + 'm ago';
      var h = Math.floor(m / 60); m = m % 60;
      if (h < 24) return h + 'h ' + m + 'm ago';
      var d = Math.floor(h / 24); h = h % 24;
      return d + 'd ' + h + 'h ago';
    }
    setInterval(function () {
      var now = Date.now() / 1000;
      document.querySelectorAll('.upd-tag[data-since]').forEach(function (el) {
        var since = parseFloat(el.getAttribute('data-since'));
        var rel = el.querySelector('.upd-rel');
        if (since && rel) rel.textContent = fmtAge(now - since);
      });
    }, 1000);
  })();
  </script>
</body>
</html>
