<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ entry_path }} · preview</title>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body { display: grid; grid-template-rows: auto minmax(0, 1fr); background: #101214; color: #f4f4f4;
      font: 14px/1.4 system-ui, sans-serif; }
    header { display: flex; align-items: center; gap: 12px; min-width: 0; padding: 8px 12px;
      border-bottom: 1px solid #30343a; }
    a { color: inherit; }
    a { text-decoration: none; }
    .path { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; opacity: .72; }
    .reload { margin-left: auto; border: 1px solid #464b52; border-radius: 6px; padding: 4px 9px;
      background: #20242a; }
    iframe { width: 100%; height: 100%; border: 0; background: white; }
  </style>
</head>
<body>
  <header>
    <a href="/sessions/{{ session.key }}" aria-label="back to session">← Session</a>
    <span class="path" title="{{ entry_path }}">{{ entry_path }}</span>
    <a class="reload" href="">Reload</a>
  </header>
  <iframe src="{{ preview_src }}" sandbox="allow-scripts" referrerpolicy="no-referrer"
          title="Preview of {{ entry_path }}"></iframe>
</body>
</html>
