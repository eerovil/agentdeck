# agentdeck configuration — copy to ~/.config/agentdeck/config.toml
# (override the path with the AGENTDECK_CONFIG environment variable).
#
# This file contains NO secrets. Credentials are always read from the
# provider's own store (e.g. $CLAUDE_CONFIG_DIR/.credentials.json).

[server]
# Bind address. Default 127.0.0.1 exposes nothing beyond the local host.
# For phone access, set this to your Tailscale IP, e.g. "100.101.102.103".
# NEVER bind 0.0.0.0 on an untrusted LAN — there is no auth in v0.x.
bind = "127.0.0.1"
port = 8756

[polling]
usage_interval_s = 300      # per-account OAuth usage poll (server-side rate limited)
scan_interval_s = 15        # full session rescan
liveness_interval_s = 10    # /proc pid liveness sweep
host_interval_s = 3         # aggregate host CPU + memory refresh

[usage]
# Where usage snapshots are published for other tools to read.
# Default: $XDG_RUNTIME_DIR/agentdeck (falls back to ~/.cache/agentdeck).
shared_cache_dir = ""

[history]
enabled = true              # SQLite usage, session ledger, and Deckhand state
db_path = "~/.local/share/agentdeck/agentdeck.db"
usage_retention_days = 30

[inject]
enabled = false             # write-capability kill-switch; opt in only on a trusted bind
timeout_s = 900
max_message_chars = 16000

# Codex-powered orchestration advice and automatically refreshed chat titles.
# Analyses are ephemeral and read-only, so they do not appear as sessions.
# Automatic answers are opt-in and limited to explicit low-risk multiple-choice
# questions, never approvals or permissions.
[assistant]
enabled = false
account_key = ""                # first Codex account, or e.g. "codex:main"
model = "gpt-5.6-luna"          # use gpt-5.6-terra for deeper analysis
refresh_interval_s = 60
timeout_s = 120
max_sessions = 30                  # active first, then most recently active
auto_answer = false
auto_answer_confidence = 0.9

# Deck-owned Claude worker processes (spawned/steered/revived through the
# runtime service's /claude/... API). Off by default — see docs/worker-runtime.md.
#[claude_workers]
#enabled = true
#max_workers = 4                # per account; steering a live worker is exempt
#permission_mode = "acceptEdits" # or "bypassPermissions" for fully autonomous workers
#model = ""                      # "" = account default
#state_dir = "~/.local/share/agentdeck/claude-workers"

# One [[accounts]] block per agent-CLI config dir. Labels must be unique,
# lowercase slug-safe (they appear in URLs and cache filenames).
[[accounts]]
provider = "claude_code"
label = "main"
config_dir = "~/.claude"

# Codex CLI rollouts under $CODEX_HOME/sessions/YYYY/MM/DD/.
[[accounts]]
provider = "codex"
label = "codex"
config_dir = "~/.codex"

